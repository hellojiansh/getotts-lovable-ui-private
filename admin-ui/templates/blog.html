<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog &mdash; GetOTTs | Latest News & Guides</title>
    <meta name="description" content="Read the latest news, guides, and tips about streaming services, music platforms, and premium subscriptions on the GetOTTs blog.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js" defer></script>
    <link rel="stylesheet" href="/css/styles.min.css">
    <style>
        :root {
            --blog-bg: #fdfdfd;
            --card-shadow: 0 10px 30px -10px rgba(0,0,0,0.08);
            --card-hover-shadow: 0 20px 40px -12px rgba(0,0,0,0.12);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--blog-bg); color: var(--gray-800); }

        .blog-hero {
            padding: 80px 0 60px;
            text-align: center;
            background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
        }

        .blog-hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .blog-hero p {
            font-size: 1.25rem;
            color: var(--gray-500);
            max-width: 600px;
            margin: 0 auto;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 32px;
            margin-bottom: 80px;
        }

        .blog-card {
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--gray-100);
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-hover-shadow);
            border-color: var(--primary-light);
        }

        .blog-card-image {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: linear-gradient(135deg, #f8fafc 0%, #eef4ff 100%);
            padding: 30px;
            box-sizing: border-box;
        }

        .blog-card-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-card-tag {
            display: inline-block;
            padding: 4px 12px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 16px;
            width: fit-content;
        }

        .blog-card h3 {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
            color: var(--gray-900);
        }

        .blog-card p {
            font-size: 0.95rem;
            color: var(--gray-500);
            line-height: 1.6;
            margin-bottom: 24px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .blog-card-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--gray-50);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--gray-400);
        }

        .author-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 700;
        }

        #loadingState {
            text-align: center;
            padding: 100px 0;
        }

        #emptyState {
            text-align: center;
            padding: 100px 0;
            display: none;
        }

        @media (max-width: 768px) {
            .blog-hero h1 { font-size: 2.5rem; }
            .blog-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="main-header" style="background: white; border-bottom: 1px solid var(--gray-100); position: sticky; top: 0; z-index: 100;">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between; height: 72px;">
            <a href="/" class="logo">
                <img src="/assets/images/logo-upgraded-20260603.png" alt="GetOTTs" style="height:32px; border-radius:8px;">
                <span style="font-size: 1.25rem; font-weight: 900; letter-spacing: -0.04em;">GetOTTs</span>
            </a>
            <nav style="display: flex; gap: 24px; font-weight: 600; font-size: 0.95rem;">
                <a href="/" style="color: var(--gray-600); text-decoration: none;">Store</a>
                <a href="/blog" style="color: var(--primary); text-decoration: none;">Blog</a>
                <a href="/dashboard" style="color: var(--gray-600); text-decoration: none;">My Account</a>
            </nav>
        </div>
    </header>

    <div class="blog-hero">
        <div class="container">
            <h1>Our Blog</h1>
            <p>Everything you need to know about streaming, digital subscriptions, and more.</p>
        </div>
    </div>

    <main class="container">
        <div id="loadingState">
            <div class="loading-spinner" style="width: 40px; height: 40px; margin: 0 auto 20px;"></div>
            <p>Fetching latest stories...</p>
        </div>

        <div id="emptyState">
            <i data-lucide="book-open" style="width: 48px; height: 48px; color: var(--gray-200); margin-bottom: 16px;"></i>
            <p style="font-size: 1.1rem; color: var(--gray-500);">No blog posts found yet. Check back soon!</p>
        </div>

        <div class="blog-grid" id="blogGrid">
            <!-- Blog cards will be injected here -->
        </div>
    </main>

    <footer style="background: #1a1a2e; color: white; padding: 60px 0; margin-top: 100px;">
        <div class="container" style="text-align: center;">
            <div style="font-size: 1.5rem; font-weight: 900; margin-bottom: 12px;">GetOTTs</div>
            <p style="color: rgba(255,255,255,0.6); margin-bottom: 24px;">Premium Digital Subscriptions, Simplified.</p>
            <div style="font-size: 0.85rem; color: rgba(255,255,255,0.4);">&copy; 2026 GetOTTs. All rights reserved.</div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.lucide) lucide.createIcons();
            
            const blogGrid = document.getElementById('blogGrid');
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');

            try {
                const response = await fetch('/api/v1/blogs/');
                const blogs = await response.json();
                
                loadingState.style.display = 'none';
                
                if (!blogs || blogs.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }

                blogGrid.innerHTML = blogs.map(blog => `
                    <a href="/blog/${blog.slug}" class="blog-card">
                        <img src="${blog.image_url || 'https://images.unsplash.com/photo-1522869635100-9f4c5e86aa37?auto=format&fit=crop&w=800&q=80'}" alt="${blog.title}" class="blog-card-image" loading="lazy" decoding="async" width="800" height="450">
                        <div class="blog-card-content">
                            <span class="blog-card-tag">Guide</span>
                            <h3>${blog.title}</h3>
                            <p>${blog.excerpt || blog.content.substring(0, 150) + '...'}</p>
                            <div class="blog-card-footer">
                                <div class="author-box">
                                    <div class="author-avatar">${(blog.author || 'A')[0]}</div>
                                    <span>${blog.author || 'Admin'}</span>
                                </div>
                                <span>${new Date(blog.published_at || blog.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
                            </div>
                        </div>
                    </a>
                `).join('');

                if (window.lucide) lucide.createIcons();
            } catch (error) {
                console.error('Error fetching blogs:', error);
                loadingState.innerHTML = '<p style="color: #dc2626;">Failed to load blog posts. Please refresh.</p>';
            }
        });
    </script>
    <script src="/static/js/grammar-assist.js?v=20260518-writing1" defer></script>
</body>
</html>
