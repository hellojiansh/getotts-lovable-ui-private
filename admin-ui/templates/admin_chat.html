<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
    <title>Admin Chat &mdash; GetOTTs</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="/static/css/admin-chat.css?v=supportai1">
</head>
<body>
    <div class="chat-app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="header-top">
                    <img src="https://getotts.com/assets/images/logo-upgraded-20260603.png" alt="GetOTTs" class="logo">
                    <h2>Support Inbox</h2>
                </div>
                <div class="search-container">
                    <i data-lucide="search"></i>
                    <input type="text" id="sessionSearch" placeholder="Search customers..." oninput="app.filterSessions()">
                </div>
            </header>
            <div class="session-list" id="sessionList">
                <div class="loading-state">Loading conversations...</div>
            </div>
            <footer class="sidebar-footer">
                <a href="/adminno881/" class="back-link">
                    <i data-lucide="arrow-left"></i> Back to Dashboard
                </a>
            </footer>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <div id="noChatSelected" class="empty-view">
                <div class="empty-content">
                    <i data-lucide="message-square"></i>
                    <h3>Select a conversation to start chatting</h3>
                    <p>Customer support messages will appear here in real-time.</p>
                </div>
            </div>

            <div id="chatView" class="chat-view" style="display: none;">
                <header class="chat-header">
                    <div class="customer-info">
                        <div class="avatar" id="activeAvatar">U</div>
                        <div class="details">
                            <h3 id="activeName">Customer Name</h3>
                            <span id="activeContact">email@example.com</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <div id="orderBadge" class="order-badge" style="display: none;">
                            <i data-lucide="package"></i>
                            <span id="orderNumber">OTT-123456</span>
                        </div>
                        <button class="close-btn" onclick="app.closeActiveChat()" title="Close Session">
                            <i data-lucide="check-circle"></i> Resolve
                        </button>
                    </div>
                </header>

                <div id="activeOrderContext" class="order-context-card" style="display:none;"></div>

                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will be injected here -->
                </div>

                <footer class="chat-footer">
                    <form id="replyForm" onsubmit="app.sendReply(event)">
                        <input type="text" id="replyInput" placeholder="Type a message..." autocomplete="off">
                        <button type="submit" id="sendBtn">
                            <i data-lucide="send"></i>
                        </button>
                    </form>
                </footer>
            </div>
        </main>

        <!-- Connection Overlay -->
        <div id="statusOverlay" class="status-overlay" style="display: none;">
            <div class="status-content">
                <i data-lucide="wifi-off"></i>
                <span>Disconnected. Retrying...</span>
            </div>
        </div>
    </div>

    <!-- Notification Sound -->
    <audio id="notifSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="/static/js/admin-chat-app.js?v=supportai1"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
    <script src="/static/js/grammar-assist.js?v=20260518-writing1" defer></script>
</body>
</html>
