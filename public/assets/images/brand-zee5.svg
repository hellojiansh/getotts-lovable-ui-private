  </defs>
  <rect x="48" y="48" width="416" height="416" rx="98" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="154" fill="none" stroke="#ec4899" stroke-width="12" stroke-linecap="round" stroke-dasharray="156 70"/>
  <circle cx="256" cy="256" r="126" fill="none" stroke="#22d3ee" stroke-width="10" stroke-linecap="round" stroke-dasharray="116 86" transform="rotate(54 256 256)"/>
  <circle cx="256" cy="256" r="98" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" stroke-dasharray="90 82" transform="rotate(112 256 256)"/>
  <circle cx="256" cy="256" r="70" fill="#ffffff"/>
  <text x="256" y="281" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" letter-spacing="-2" fill="#111827">ZEE5</text>
