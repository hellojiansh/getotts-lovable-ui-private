# GetOTTs — Netlify Configuration

[build]
  # Frontend is a static site — no build step needed
  publish = "."

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://cdn.jsdelivr.net https://www.googletagmanager.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.getotts.com https://auth.getotts.com https://paygate.getotts.com https://wa.getotts.com https://YOUR_SUPABASE_PROJECT_REF.supabase.co wss://YOUR_SUPABASE_PROJECT_REF.supabase.co https://api.country.is https://ipapi.co https://1.1.1.1 https://www.facebook.com https://connect.facebook.net; frame-src https://challenges.cloudflare.com https://www.googletagmanager.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/dashboard*"
  [headers.values]
    X-Robots-Tag = "noindex, noarchive, nosnippet"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/wallet*"
  [headers.values]
    X-Robots-Tag = "noindex, noarchive, nosnippet"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/checkout*"
  [headers.values]
    X-Robots-Tag = "noindex, noarchive, nosnippet"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/order*"
  [headers.values]
    X-Robots-Tag = "noindex, noarchive, nosnippet"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/login*"
  [headers.values]
    X-Robots-Tag = "noindex, noarchive, nosnippet"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache videos aggressively (served from Netlify CDN, not Supabase)
[[headers]]
  for = "/assets/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files - Do NOT cache aggressively to ensure users always get the latest version
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Enable Pretty URLs (strip .html automatically)
[build.processing.html]
  pretty_urls = true

[[edge_functions]]
  function = "seo"
  path = "/"

